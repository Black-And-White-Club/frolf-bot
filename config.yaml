postgres:
  dsn: "postgres://user:password@localhost:5432/frolf_bot?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime: 5m

round_queue:
  pool_max_conns: 12
  default_workers: 50
  round_workers: 25
  fetch_poll_interval: 0s

nats:
  url: "nats://localhost:4222"

jwt:
  secret: ""
  default_ttl: 24h

observability:
  loki_url: "http://loki.observability:3100"
  loki_tenant_id: "1"
  metrics_address: "localhost:4317"
  tempo_endpoint: "localhost:4317"
  tempo_insecure: true
  tempo_sample_rate: 0.1
  environment: "local"

auth_callout:
  enabled: false
  subject: "$SYS.REQ.USER.AUTH"
  # Account seed (SAA...) - used to sign user JWTs in centralized auth callout
  # In production, override via AUTH_CALLOUT_ISSUER_NKEY env var
  issuer_nkey: ""
  signing_nkey: ""  # Unused in centralized mode
